<div class="container rooms-container">
  <h2 class="section-title">Our Rooms</h2>

  @if (error) {
  <p class="error">{{ error }}</p>
  }

  <!-- Room Filter Section -->
  <div class="filter-container">
    <label for="roomTypeFilter">Filter By Room Type</label>
    <select
      id="roomTypeFilter"
      class="room-select"
      [(ngModel)]="selectedRoomType"
      (change)="handleRoomTypeChange($event)"
    >
      <option value="">All</option>
      <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
    </select>
  </div>

  <!-- Room Result Component -->
  <app-roomresult [roomSearchResults]="currentRooms"></app-roomresult>

  <!-- Pagination Component -->
  <app-pagination
    [roomPerPage]="roomsPerPage"
    [totalRooms]="filteredRooms.length"
    [currentPage]="currentPage"
    (paginate)="paginate($event)"
  ></app-pagination>
</div>
