<div class="container admin-table-container">
  <div class="admin-table-header">
    <h2>Manage Rooms</h2>
    <button class="btn btn-primary" (click)="navigateToAddRoom()">
      Add New Room
    </button>
  </div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="filter-container">
    <div class="form-group">
      <label for="roomTypeFilter">Filter by Room Type:</label>
      <select
        id="roomTypeFilter"
        class="form-control"
        [(ngModel)]="selectedRoomType"
        (change)="handleRoomTypeChange($event)"
      >
        <option value="">All</option>
        <option *ngFor="let type of roomTypes" [value]="type">
          {{ type }}
        </option>
      </select>
    </div>
  </div>

  <app-roomresult [roomSearchResults]="currentRooms"></app-roomresult>

  <app-pagination
    [roomPerPage]="roomsPerPage"
    [totalRooms]="filteredRooms.length"
    [currentPage]="currentPage"
    (paginate)="paginate($event)"
  ></app-pagination>
</div>
