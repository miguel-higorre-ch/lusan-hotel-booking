<div class="container admin-form-container">
  <div class="card">
    <div class="admin-form-header">
      <h2>Edit Room</h2>
    </div>

    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">{{ success }}</div>

    <form class="room-form">
      <div class="form-group">
        <label for="roomPhoto">Room Image</label>
        <div *ngIf="preview" class="image-preview">
          <img [src]="preview" alt="Room Preview" />
        </div>
        <div *ngIf="!preview && roomDetails.imageUrl" class="image-preview">
          <img [src]="imageBaseUrl + roomDetails.imageUrl" alt="Room Image" />
        </div>
        <input
          id="roomPhoto"
          type="file"
          class="form-control"
          name="file"
          (change)="handleFileChange($event)"
        />
      </div>

      <div class="form-group">
        <label for="roomType">Room Type</label>
        <select
          id="roomType"
          name="type"
          class="form-control"
          [(ngModel)]="roomDetails.type"
          (change)="handleChange($event)"
        >
          <option value="">Select a type</option>
          <option *ngFor="let type of roomTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="pricePerNight">Room Price</label>
        <input
          id="pricePerNight"
          type="number"
          class="form-control"
          name="pricePerNight"
          [(ngModel)]="roomDetails.pricePerNight"
          (input)="handleChange($event)"
        />
      </div>

      <div class="form-group">
        <label for="roomNumber">Room Number</label>
        <input
          id="roomNumber"
          type="text"
          class="form-control"
          name="roomNumber"
          [(ngModel)]="roomDetails.roomNumber"
          (input)="handleChange($event)"
        />
      </div>

      <div class="form-group">
        <label for="capacity">Room Capacity</label>
        <input
          id="capacity"
          type="number"
          class="form-control"
          name="capacity"
          [(ngModel)]="roomDetails.capacity"
          (input)="handleChange($event)"
        />
      </div>

      <div class="form-group">
        <label for="description">Room Description</label>
        <textarea
          id="description"
          class="form-control"
          name="description"
          [(ngModel)]="roomDetails.description"
          (input)="handleChange($event)"
        ></textarea>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="btn btn-primary"
          (click)="handleUpdate()"
        >
          Update Room
        </button>
        <button
          type="button"
          class="btn btn-danger"
          (click)="handleDelete()"
        >
          Delete Room
        </button>
      </div>
    </form>
  </div>
</div>
