<div class="container admin-form-container">
  <div class="card">
    <div class="admin-form-header">
      <h2>Edit Profile</h2>
    </div>

    @if (error) {
    <p class="error text-center">{{ error }}</p>
    } @if (user) {
    <div class="profile-details">
      <div class="form-group">
        <label>First Name</label>
        <p class="form-control-static">{{ user.firstName }}</p>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <p class="form-control-static">{{ user.lastName }}</p>
      </div>
      <div class="form-group">
        <label>Email</label>
        <p class="form-control-static">{{ user.email }}</p>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <p class="form-control-static">{{ user.phoneNumber }}</p>
      </div>
    </div>

    <div class="text-center">
      <button class="btn btn-danger" (click)="handleDeleteProfile()">Delete My Account</button>
    </div>
    } @else {
    <p class="text-center">Loading user data...</p>
    }
  </div>
</div>
