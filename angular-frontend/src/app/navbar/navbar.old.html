<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/home">Lusan Hotel</a>
  </div>

  <button class="menu-toggle" (click)="toggleMenu()">
    <i class="fas fa-bars"></i>
  </button>

  <ul class="navbar-links" [class.open]="isMenuOpen()">
    <li><a routerLink="/home" routerLinkActive="active">Home</a></li>
    <li><a routerLink="/rooms" routerLinkActive="active">Rooms</a></li>
    <li>
      <a routerLink="/find-booking" routerLinkActive="active">Find Booking</a>
    </li>

    @if (isCustomer) {
    <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
    }
    
    @if (isAdmin) {
    <li><a routerLink="/admin" routerLinkActive="active">Admin</a></li>
    }
    
    @if (!isAuthenticated) {
    <li><a routerLink="/login" routerLinkActive="active">Login</a></li>
    <li><a routerLink="/register" routerLinkActive="active">Register</a></li>
    }
    
    @if (isAuthenticated) {
    <li><button (click)="handleLogout()">Logout</button></li>
    }
  </ul>
</nav>
