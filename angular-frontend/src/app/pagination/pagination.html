<div>
    <ul>
        <li *ngFor="let number of pageNumbers">
            <button class="btn btn-primary"
                (click)="onPageChange(number)"
                [ngClass]="{
                    'page-button': true,
                    'current-page': currentPage === number,
                }"
            >
                {{ number }}
            </button>
        </li>
    </ul>
</div>
